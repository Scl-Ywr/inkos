# fly.toml — InkOS Studio deployment configuration
# Docs: https://fly.io/docs/reference/configuration/

app = "inkos-studio"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  INKOS_STUDIO_PORT = "8080"
  INKOS_PROJECT_ROOT = "/data"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 30

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for books, state, and SQLite database
# Data survives redeployments!
[[mounts]]
  source = "inkos_data"
  destination = "/data"
  initial_size = "1gb"
